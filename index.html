<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSoft Pack - Microsoft Key CID Generator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap');

        :root {
            --primary-color: #00c6ff;
            --secondary-color: #0072ff;
            --text-main: #ffffff;
            --text-muted: #a0aec0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #0f2027, #203a43);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        header {
            width: 100%;
            padding: 2rem 0;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            animation: fadeInDown 0.8s ease-out;
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 3px;
            filter: drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.3));
        }

        .subtitle {
            margin-top: 0.5rem;
            font-size: 1.2rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 1px;
        }

        main {
            flex: 1;
            width: 100%;
            max-width: 1200px;
            padding: 2.5rem 1.5rem;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        /* Iframe Scaling and Cropping Logic */
        .iframe-wrapper {
            position: relative;
            width: 100%;
            max-width: 1061px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            /* Default height before JS scale adjusting */
            height: 492px;
            margin-bottom: 2rem;
            transition: height 0.3s ease;
        }

        .iframe-crop-box {
            position: absolute;
            width: 1061px;
            height: 492px;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
            background: #ffffff;
            transform-origin: top center;
            /* Smooth scaling across devices */
            transition: transform 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .iframe-crop-box:hover {
            box-shadow: 0 15px 60px rgba(0, 198, 255, 0.2);
            border-color: rgba(0, 198, 255, 0.5);
        }

        .iframe-crop-box iframe {
            position: absolute;
            background: transparent;
            /* Force the desktop resolution for seamless cropping */
            width: 1366px;
            height: 633px;

            /* Precise CROP DIMENSIONS for getcid.us inside a 1366px browser window */
            /* This hides exactly the gray background (top and left sides) */
            top: -55px;
            left: -153px;

            border: none;
            /* Prevent scrolling inside the iframe to hide scrollbars */
            overflow: hidden;
        }

        /* Loader inside iframe container */
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 48px;
            height: 48px;
            border: 5px solid rgba(0, 0, 0, 0.05);
            border-bottom-color: var(--primary-color);
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
            z-index: 1;
            /* Under the iframe but visible if background is transparent initially */
        }

        .fallback-link {
            text-align: center;
            margin-top: 1rem;
            padding: 1rem 2rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            animation: fadeInUp 0.8s ease-out 0.6s both;
        }

        .fallback-link p {
            margin: 0;
            color: var(--text-muted);
            font-size: 1rem;
        }

        .fallback-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease, text-shadow 0.3s ease;
            margin-left: 0.5rem;
        }

        .fallback-link a:hover {
            color: var(--secondary-color);
            text-shadow: 0 0 10px rgba(0, 198, 255, 0.4);
        }

        footer {
            width: 100%;
            text-align: center;
            padding: 2rem 0;
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-muted);
            font-size: 0.95rem;
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        footer span {
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes rotation {
            0% {
                transform: translate(-50%, -50%) rotate(0deg);
            }

            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.2rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            main {
                padding: 1.5rem 1rem;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>DSoft Pack</h1>
        <div class="subtitle">Microsoft Key CID Generator</div>
    </header>

    <main>
        <!-- The responsive container -->
        <div class="iframe-wrapper" id="iframeWrapper">
            <!-- The fixed size box that crops out the gray area -->
            <div class="iframe-crop-box" id="iframeCropBox">
                <iframe src="https://getcid.us/" title="GetCID Platform" allowfullscreen scrolling="no"></iframe>
            </div>
        </div>
    </main>

    <footer>
        &copy; 2026 <span>DSoft Pack</span>. All rights reserved.
    </footer>

    <script>
        // JS to scale the inner 1061x492 crop box to fit within smaller screens flawlessly
        function resizeResponsiveIframe() {
            const wrapper = document.getElementById('iframeWrapper');
            const cropBox = document.getElementById('iframeCropBox');
            if (!wrapper || !cropBox) return;

            const parentWidth = wrapper.clientWidth;
            // The exact pixel dimensions of the white box inside getcid.us
            const originalWidth = 1061;
            const originalHeight = 492;

            if (parentWidth < originalWidth) {
                // Determine scale based on container width
                const scale = parentWidth / originalWidth;

                // Scale the crop box down
                cropBox.style.transform = `scale(${scale})`;

                // Adjust the height of the wrapper so content below moves up correctly
                wrapper.style.height = `${originalHeight * scale}px`;
            } else {
                // If the screen is large enough, display at 100% scale
                cropBox.style.transform = `scale(1)`;
                wrapper.style.height = `${originalHeight}px`;
            }
        }

        // Add event listeners for dynamic resizing
        window.addEventListener('resize', resizeResponsiveIframe);
        window.addEventListener('DOMContentLoaded', resizeResponsiveIframe);

        // Safety triggers in case layout rendering is delayed
        setTimeout(resizeResponsiveIframe, 100);
        setTimeout(resizeResponsiveIframe, 500);
        setTimeout(resizeResponsiveIframe, 2000);
    </script>

</body>

</html>
